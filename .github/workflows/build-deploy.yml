name: build-and-deploy-book

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissões exigidas pelo deploy nativo do GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante um único deploy concorrente, sem cancelar um deploy em andamento
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Setup TinyTeX (LaTeX para o PDF)
        uses: r-lib/actions/setup-tinytex@v2

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ hashFiles('DESCRIPTION') }}

      - name: Install dependencies
        run: |
          install.packages(c("bookdown", "rmarkdown", "tinytex"))
        shell: Rscript {0}

      - name: Render book (HTML + PDF + EPUB)
        run: bookdown::render_book("index.Rmd", output_format = "all")
        shell: Rscript {0}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
